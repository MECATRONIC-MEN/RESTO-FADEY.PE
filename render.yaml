# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: resto-fadey-platform
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # --- Configurar en el panel de Render (Environment) ---
      - key: AUTH_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: API_SECRET_KEY
        generateValue: true
      - key: NEXT_PUBLIC_PLATFORM_URL
        sync: false
      - key: NEXT_PUBLIC_POS_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
